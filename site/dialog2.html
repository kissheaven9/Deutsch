<style>
  h1{font-size:28px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;align-items:center}
  .ic{border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-size:14px;padding:7px 10px}
  .part{display:flex;align-items:center;gap:14px;margin:30px 0 12px;padding:13px 18px;border-radius:16px;border:1px solid var(--line)}
  .part .pico{font-size:28px}.part .pk{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:700}.part h2{margin:2px 0 0;font-size:22px}
  .part.read{background:#f1f5f9} .part.text{background:#faf5ff} .part.train{background:#f3e8ff;border-color:#e9d5ff}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin:16px 0;box-shadow:0 2px 10px #00000012}
  .panel>h3{margin:-16px -16px 14px;padding:12px 16px;font-size:17px;display:flex;gap:10px;align-items:center;background:#f5f3ff;border-bottom:1px solid #eee6fb;border-radius:16px 16px 0 0}
  .exnum{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700}
  .panel .sub{color:var(--muted);font-size:13px;margin:-4px 0 10px}
  .stage{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);line-height:0}
  .stage>img{width:100%;height:auto;display:block}
  .imgwait{background:#f8fafc;color:#9ca3af;font-size:14px;line-height:1.5;padding:40px 20px;text-align:center;border-radius:14px;border:1px dashed var(--line)}
  .mk{position:absolute;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px #0007;cursor:pointer;padding:0;z-index:2}
  .mk{background:#475569}   /* серые точки — РОД НЕ выдаём, ученик угадывает сам */
  .mk.gray{background:#9ca3af} .mk.gray .mkw{border-color:#9ca3af;color:#374151}
  .mk.gray .mkw.der{border-color:var(--der);color:var(--der)} .mk.gray .mkw.die{border-color:var(--die);color:var(--die)} .mk.gray .mkw.das{border-color:var(--das);color:var(--das)}
  .mk .mkw{display:none;position:absolute;top:50%;transform:translateY(-50%);white-space:nowrap;background:#fff;border:2px solid;border-radius:8px;padding:3px 8px;box-shadow:0 2px 8px #0006;font-weight:700;font-size:12px;line-height:1.2}
  .mk .mkw{border-color:#94a3b8;color:#334155}   /* подпись нейтральная; артикль виден только в самом слове */
  .mk.open{z-index:5} .mk.open .mkw{display:block}
  .mk.dir-l .mkw{right:140%} .mk.dir-r .mkw{left:140%}
  .stagehint{font-size:12px;color:var(--muted);margin:6px 0 0}
  details.promptbox{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin:12px 0}
  details.promptbox summary{cursor:pointer;font-weight:700;color:#a16207;font-size:14px}
  .prompt{white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:12px;line-height:1.55;color:#374151;margin-top:8px}
  .bh{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:0 0 6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .dlg p{margin:0 0 7px;font-size:15px;line-height:1.55}
  .dlg.de p{color:var(--ink);font-weight:500} .dlg.ru p{color:#374151}
  .dlg .sp{font-weight:700}
  .dlg .sp.der{color:var(--der)} .dlg .sp.die{color:var(--die)} .dlg .sp.das{color:var(--das)}
  .dlg .sp.carla{color:#b8860b}   /* Carla — жёлтый (розовый сливался с красным Греты) */
  .dlg .sp.theo{color:#2563eb}    /* Тео — синий (чтобы отличать от Lina) */
  .dlg .rem,.dlg p.rem{color:#9ca3af;font-style:italic;font-size:13px}
  .leg{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--muted);margin:0 0 8px}
  .leg b{font-weight:800}
  .q{border-top:1px solid var(--line);padding:9px 0}
  .qq{font-weight:600;color:var(--ink);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .lk2{border:none;background:#f3e8ff;color:var(--accent);border-radius:7px;font-size:12px;padding:2px 8px;cursor:pointer}
  .qru{color:var(--muted);font-size:13px;margin:3px 0}
  .qin{flex:1;min-width:150px;border:2px solid var(--line);border-radius:9px;padding:7px 10px;font-size:14px;font-family:inherit}
  .qin:focus{outline:none;border-color:var(--accent)}
  .btn.sm{padding:7px 11px;font-size:13px}
  .qres{margin-top:5px;font-size:14px;font-weight:600}
  .wq{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding:9px 0}
  .wq .ru{min-width:130px;color:#374151}
  .wq input{border:2px solid var(--line);border-radius:9px;padding:7px 10px;font-size:15px;font-family:inherit;flex:1;min-width:150px}
  .wq input:focus{outline:none;border-color:var(--accent)}
  .wq.ok input{border-color:var(--das);background:#e8f6ee} .wq.bad input{border-color:var(--die);background:#fdecec}
  .wq .corr{font-size:13px;color:var(--die);font-weight:600;width:100%}
  .score{font-weight:700;margin-top:8px}
  .match{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .mcol{display:flex;flex-direction:column;gap:7px}
  .mchip{border:2px solid var(--line);border-radius:10px;padding:9px 11px;cursor:pointer;font-size:15px;background:#fff;text-align:center}
  .mchip.de{font-weight:700;color:var(--accent)} .mchip.sel{border-color:var(--accent);background:#f3e8ff}
  .mchip .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-left:8px;vertical-align:middle}
  .noselect{user-select:none;-webkit-user-select:none}
  .sortgrid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(7,auto);grid-auto-flow:column;column-gap:28px}
  @media(max-width:620px){.sortgrid{grid-template-columns:1fr;grid-template-rows:none;grid-auto-flow:row}}
  .btn:disabled,.btn[disabled]{opacity:.45;cursor:not-allowed}
  .sortdots{display:flex;gap:8px;align-items:center;margin:0}
  .pdot{width:11px;height:11px;border-radius:50%;background:#fff;border:1.5px solid #cbd5e1;box-sizing:border-box;transition:.15s}
  .pdot.seen{background:#c4b5fd;border-color:#c4b5fd}
  .pdot.cur{background:var(--accent);border-color:var(--accent);transform:scale(1.3)}
  .srow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-top:1px solid var(--line);padding:8px 0}
  .srow .sw{font-weight:700;min-width:130px}
  .sbtns{display:flex;gap:6px}
  .sbtns button{border:2px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px;font-weight:700;cursor:pointer;font-size:14px;color:#6b7280}
  .sbtns button.der.on{background:var(--der);color:#fff;border-color:var(--der)}
  .sbtns button.die.on{background:var(--die);color:#fff;border-color:var(--die)}
  .sbtns button.das.on{background:var(--das);color:#fff;border-color:var(--das)}
  .srow.ok{background:#f0fdf4}.srow.bad{background:#fef2f2}
  .srow .mark{font-weight:800;margin-left:auto}
</style>

const DIALOGS={
 1:{ title:'Текст 1 — В комнате мамы Лины', img:'img/dialog2-1b.png',
   sub:'Тео и Лина заходят в красивую комнату мамы и рассматривают вещи: цвет, материал, цена, оценка. Рода вперемешку. L4–L5.',
   de:`<p><span class="sp das lina">Lina:</span> Theo, hier! Das ist Mamas Zimmer.</p>
   <p><span class="sp das theo">Theo:</span> Oh, wie schön! Ich sehe so viele Dinge!</p>
   <p><span class="sp das lina">Lina:</span> Ja! Der Tisch ist aus Holz, braun und groß. Schön, oder?</p>
   <p><span class="sp das theo">Theo:</span> Und der Spiegel! Der Spiegel ist groß. Aber teuer?</p>
   <p><span class="sp das lina">Lina:</span> Ja, sehr teuer — neunundneunzig Euro! Der Schrank ist weiß und neu.</p>
   <p><span class="sp das theo">Theo:</span> Der Sessel ist rot, der Teppich ist blau! Ist der Sessel aus Holz?</p>
   <p><span class="sp das lina">Lina:</span> Nein, der Sessel ist nicht aus Holz. Aber er ist praktisch.</p>
   <p><span class="sp das theo">Theo:</span> Und die Lampe? Die Lampe ist gelb und modern!</p>
   <p><span class="sp das lina">Lina:</span> Die Lampe ist aus Glas. Nur neun Euro — ein Sonderangebot!</p>
   <p><span class="sp das theo">Theo:</span> Günstig! Und die Uhr ist rot, die Tasche ist gelb, die Brille ist schwarz, die Kette ist klein…</p>
   <p><span class="sp das lina">Lina:</span> Mamas Tasche ist groß und schön. Und hier — ein Bild!</p>
   <p><span class="sp das theo">Theo:</span> Das Bild ist schön! Das Bett ist weiß, das Regal ist aus Holz, das Buch ist alt.</p>
   <p><span class="sp das lina">Lina:</span> Mamas Zimmer ist schön, oder? So viele Farben — rot, gelb, blau, grün, weiß, braun, schwarz!</p>
   <p><span class="sp das theo">Theo:</span> Ja, sehr schön! Aber wo ist Mama?</p>
   <p><span class="sp das lina">Lina:</span> <span class="rem">(lacht)</span> Hier ist Mama — sie kommt!</p>
   <p><span class="sp die">Mama:</span> Mein Zimmer ist schön, oder, Kinder?</p>
   <p><span class="sp das theo">Theo:</span> Sehr schön! Ich finde Mamas Zimmer schön! Alles ist aus Holz, Glas und Metall!</p>`,
   ru:`<p><span class="sp das lina">Lina:</span> Тео, сюда! Это комната мамы.</p>
   <p><span class="sp das theo">Тео:</span> О, как красиво! Я вижу столько всего!</p>
   <p><span class="sp das lina">Lina:</span> Да! Стол из дерева, коричневый и большой. Красиво, правда?</p>
   <p><span class="sp das theo">Тео:</span> А зеркало! Зеркало большое. Но дорогое?</p>
   <p><span class="sp das lina">Lina:</span> Да, очень дорогое — девяносто девять евро! Шкаф белый и новый.</p>
   <p><span class="sp das theo">Тео:</span> Кресло красное, ковёр синий! Кресло из дерева?</p>
   <p><span class="sp das lina">Lina:</span> Нет, кресло не из дерева. Но удобное.</p>
   <p><span class="sp das theo">Тео:</span> А лампа? Лампа жёлтая и современная!</p>
   <p><span class="sp das lina">Lina:</span> Лампа из стекла. Всего девять евро — по скидке!</p>
   <p><span class="sp das theo">Тео:</span> Выгодно! А часы красные, сумка жёлтая, очки чёрные, цепочка маленькая…</p>
   <p><span class="sp das lina">Lina:</span> Мамина сумка большая и красивая. А вот — картинка!</p>
   <p><span class="sp das theo">Тео:</span> Картинка красивая! Кровать белая, полка из дерева, книжка старая.</p>
   <p><span class="sp das lina">Lina:</span> Мамина комната красивая, правда? Сколько цветов — красный, жёлтый, синий, зелёный, белый, коричневый, чёрный!</p>
   <p><span class="sp das theo">Тео:</span> Да, очень красиво! А где мама?</p>
   <p><span class="sp das lina">Lina:</span> <span class="rem">(смеётся)</span> Вот мама — идёт!</p>
   <p><span class="sp die">Мама:</span> Моя комната красивая, правда, дети?</p>
   <p><span class="sp das theo">Тео:</span> Очень красиво! Мне нравится мамина комната! Всё из дерева, стекла и металла!</p>`,
   qa:[
     {q:'Wessen Zimmer ist das?',ru:'Чья это комната?',a:'Das ist Mamas Zimmer.',k:'mamas'},
     {q:'Wie viel kostet der Spiegel?',ru:'Сколько стоит зеркало?',a:'Der Spiegel kostet neunundneunzig Euro.',k:'neunundneunzig'},
     {q:'Welche Farbe hat der Sessel?',ru:'Какого цвета кресло?',a:'Der Sessel ist rot.',k:'rot'},
     {q:'Aus welchem Material ist die Lampe?',ru:'Из какого материала лампа?',a:'Die Lampe ist aus Glas.',k:'glas'},
     {q:'Wie viel kostet die Lampe?',ru:'Сколько стоит лампа?',a:'Die Lampe kostet neun Euro.',k:'neun'}],
   match:[['der Tisch','стол'],['der Spiegel','зеркало'],['der Sessel','кресло'],['die Lampe','лампа'],['die Tasche','сумка'],['das Bett','кровать']],
   sort:[['Tisch','der'],['Spiegel','der'],['Sessel','der'],['Schrank','der'],['Lampe','die'],['Tasche','die'],['Uhr','die'],['Bett','das'],['Regal','das'],['Bild','das']],
   write:[['стол','der Tisch'],['зеркало','der Spiegel'],['кресло','der Sessel'],['лампа','die Lampe'],['сумка','die Tasche'],['кровать','das Bett']],
   verbs:[['sein','быть'],['haben','иметь'],['kosten','стоить'],['finden','находить / считать'],['sehen','видеть'],['kommen','приходить']]
 },
 2:{ title:'Текст 2 — Грета в гостях у Carla', img:'img/dialog2-2.png',
   sub:'Грета у соседки Carla смотрит её вещи: цена, материал, цвета, оценка. Рода вперемешку (der/die/das). L4–L5.',
   de:`<p><span class="sp die">Greta:</span> Carla! Was hast du da? So schön!</p>
   <p><span class="sp die carla">Carla:</span> Hallo, Greta! Hier — mein Sofa! Es ist grün und groß.</p>
   <p><span class="sp die">Greta:</span> Schön! Und der Tisch? Ist er aus Holz?</p>
   <p><span class="sp die carla">Carla:</span> Ja, der Tisch ist aus Holz, braun. Und der Stuhl auch.</p>
   <p><span class="sp die">Greta:</span> Wie viel kostet der Spiegel?</p>
   <p><span class="sp die carla">Carla:</span> Der Spiegel kostet neunundneunzig Euro — teuer!</p>
   <p><span class="sp die">Greta:</span> Mamma mia! Und die Lampe ist gelb und modern.</p>
   <p><span class="sp die carla">Carla:</span> Ja, die Lampe ist aus Glas. Nur neun Euro — ein Sonderangebot!</p>
   <p><span class="sp die">Greta:</span> Günstig! Und das Regal? Und das Bild?</p>
   <p><span class="sp die carla">Carla:</span> Das Regal ist aus Metall, das Bild ist schön. Und hier — meine Tasche und meine Uhr.</p>
   <p><span class="sp die">Greta:</span> Die Tasche ist rot, die Uhr ist klein! Und das Buch?</p>
   <p><span class="sp die carla">Carla:</span> Das Buch ist alt. Aber der Sessel ist neu — rot und praktisch!</p>
   <p><span class="sp die">Greta:</span> So viele Farben! Rot, gelb, grün, blau, weiß, schwarz, braun!</p>
   <p><span class="sp die carla">Carla:</span> Ja! Der Tisch, die Lampe, das Sofa — alles ist schön!</p>
   <p><span class="sp die">Greta:</span> Deine Möbel sind modern und günstig. Bravo, Carla!</p>
   <p><span class="sp die carla">Carla:</span> Danke, Greta! Alles ist schön bei mir!</p>`,
   ru:`<p><span class="sp die">Грета:</span> Carla! Что это у тебя? Как красиво!</p>
   <p><span class="sp die carla">Carla:</span> Привет, Грета! Вот — мой диван! Он зелёный и большой.</p>
   <p><span class="sp die">Грета:</span> Красиво! А стол? Он из дерева?</p>
   <p><span class="sp die carla">Carla:</span> Да, стол из дерева, коричневый. И стул тоже.</p>
   <p><span class="sp die">Грета:</span> Сколько стоит зеркало?</p>
   <p><span class="sp die carla">Carla:</span> Зеркало стоит девяносто девять евро — дорого!</p>
   <p><span class="sp die">Грета:</span> Mamma mia! А лампа жёлтая и современная.</p>
   <p><span class="sp die carla">Carla:</span> Да, лампа из стекла. Всего девять евро — по скидке!</p>
   <p><span class="sp die">Грета:</span> Выгодно! А полка? А картинка?</p>
   <p><span class="sp die carla">Carla:</span> Полка из металла, картинка красивая. А вот — моя сумка и мои часы.</p>
   <p><span class="sp die">Грета:</span> Сумка красная, часы маленькие! А книжка?</p>
   <p><span class="sp die carla">Carla:</span> Книжка старая. А вот кресло новое — красное и удобное!</p>
   <p><span class="sp die">Грета:</span> Сколько цветов! Красный, жёлтый, зелёный, синий, белый, чёрный, коричневый!</p>
   <p><span class="sp die carla">Carla:</span> Да! Стол, лампа, диван — всё красивое!</p>
   <p><span class="sp die">Грета:</span> Мебель у тебя современная и недорогая. Браво, Carla!</p>
   <p><span class="sp die carla">Carla:</span> Спасибо, Грета! У меня всё красиво!</p>`,
   qa:[
     {q:'Welche Farbe hat das Sofa?',ru:'Какого цвета диван?',a:'Das Sofa ist grün.',k:'grün'},
     {q:'Aus welchem Material ist das Taschentuch?',ru:'Из какого материала салфетки?',a:'Das Taschentuch ist aus Papier.',k:'papier'},
     {q:'Wie viel kostet der Spiegel?',ru:'Сколько стоит зеркало?',a:'Der Spiegel kostet neunundneunzig Euro.',k:'neunundneunzig'},

     {q:'Wie ist der Sessel?',ru:'Какое кресло?',a:'Der Sessel ist neu, rot und praktisch.',k:'neu'}],
   match:[['der Tisch','стол'],['der Spiegel','зеркало'],['die Lampe','лампа'],['die Tasche','сумка'],['das Sofa','диван'],['das Regal','полка']],
   sort:[['Tisch','der'],['Stuhl','der'],['Spiegel','der'],['Sessel','der'],['Lampe','die'],['Tasche','die'],['Uhr','die'],['Sofa','das'],['Regal','das'],['Buch','das']],
   write:[['стол','der Tisch'],['зеркало','der Spiegel'],['лампа','die Lampe'],['сумка','die Tasche'],['диван','das Sofa'],['полка','das Regal']],
   verbs:[['kosten','стоить'],['finden','находить / считать'],['sein','быть'],['haben','иметь'],['sehen','видеть']]
 },
 3:{ title:'Текст 3 — Otto делает онлайн-покупки', img:'img/dialog2-3.png',
   sub:'Otto смотрит онлайн-магазин и рассказывает, что увидел: цена, скидка, цвет, материал. Рода вперемешку (der/die/das). L4–L5.',
   de:`<p><span class="sp der">Otto:</span> Oh, ich kaufe heute online! Was sehe ich hier? Ein Sofa — es ist blau und schön! Wie viel kostet das Sofa? Hundert Euro… hmm, das ist viel. Über das Sofa denke ich noch nach. Hier ist ein Tisch aus Holz, braun — achtzig Euro. Zu teuer! Der Spiegel ist auch aus Holz, der Schrank ist weiß — zweihundert Euro! Nein, danke! Die Uhr ist rot, aus Metall — fünfzig Euro. Zu teuer! Die Kamera ist schwarz, das Regal ist auch schwarz, aus Metall und Holz. Alles so teuer — nein, nein! Das Feuerzeug ist rot, der Kugelschreiber ist blau. Und der Geldbeutel? Er ist grün und praktisch — nur fünf Euro! Wie günstig! Den kaufe ich! Und das Taschentuch — es ist blau, aus Papier. Heute gibt es ein großes Sonderangebot — ich kaufe fünf Taschentücher! Über das Sofa denke ich noch nach. Online-Shopping ist super!</p>`,

function speakDialog(btn){

              : sp.classList.contains('lina')?'childgirl'
              : sp.classList.contains('der')?'male'
              : sp.classList.contains('die')?'female':'child';
    const c=p.cloneNode(true); c.querySelectorAll('.sp,.rem').forEach(e=>e.remove());

  }).filter(x=>x.t);

}

const PCOL=['#eab308','#f97316','#ef4444','#22c55e','#3b82f6','#a855f7'];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let selDe=null,links={},colorOf={},nextC=0;
function cDe(i){return document.querySelector(`#mDe .mchip[data-i="${i}"]`);}
function paint(el,c){if(!el)return;el.querySelector('.dot')?.remove();if(c){el.style.background=c+'22';el.style.borderColor=c;el.insertAdjacentHTML('beforeend',`<span class="dot" style="background:${c}"></span>`);}else{el.style.background='';el.style.borderColor='';}}
function renderMatch(){selDe=null;links={};colorOf={};nextC=0;const M=D.match;const order=shuffle(M.map((p,i)=>i));
  document.getElementById('mDe').innerHTML=M.map((p,i)=>`<div class="mchip de" data-i="${i}" onclick="pickDe(${i})">${p[0]}</div>`).join('');
  document.getElementById('mRu').innerHTML=order.map(i=>`<div class="mchip ru" data-i="${i}" onclick="pickRu(${i})">${M[i][1]}</div>`).join('');

function pickDe(i){selDe=(selDe===i?null:i);document.querySelectorAll('#mDe .mchip').forEach(c=>c.classList.toggle('sel',+c.dataset.i===selDe));}
function pickRu(j){if(selDe===null)return;for(const k in links){if(links[k]===j&&+k!==selDe){delete links[k];paint(cDe(+k),null);}}links[selDe]=j;if(colorOf[selDe]===undefined){colorOf[selDe]=PCOL[nextC%PCOL.length];nextC++;}paint(cDe(selDe),colorOf[selDe]);document.querySelectorAll('#mRu .mchip').forEach(c=>{const o=Object.keys(links).find(k=>links[k]===+c.dataset.i);paint(c,o!==undefined?colorOf[o]:null);});document.querySelectorAll('#mDe .mchip').forEach(c=>c.classList.remove('sel'));selDe=null;}

function interleave(arrs){const out=[];let i=0,any=true;while(any){any=false;for(const a of arrs){if(i<a.length){out.push(a[i]);any=true;}}i++;}return out;}
const SORTPOOL=interleave([_der,_die,_das]);
const SPP=14, SPAGES=Math.ceil(SORTPOOL.length/SPP);
let sPage=(N-1)%SPAGES; const sChecked=new Set();

function renderSort(){const items=SORTPOOL.slice(sPage*SPP,sPage*SPP+SPP);
  document.getElementById('sortList').innerHTML=items.map((p,i)=>`<div class="srow" data-i="${i}" data-g="${p[1]}"><span class="sw">${p[0]}</span><span class="sbtns"><button class="der" onclick="pickG(this,'der')">der</button><button class="die" onclick="pickG(this,'die')">die</button><button class="das" onclick="pickG(this,'das')">das</button></span><span class="mark"></span></div>`).join('');

function sortNext(){sPage=(sPage+1)%SPAGES;renderSort();}

function sortCheck(){const rows=[...document.querySelectorAll('#sortList .srow')];let ok=0;rows.forEach(r=>{if(!r.dataset.pick)return;const good=r.dataset.pick===r.dataset.g;r.classList.toggle('ok',good);r.classList.toggle('bad',!good);r.querySelector('.mark').textContent=good?'✓':('✗ '+r.dataset.g);if(good)ok++;});document.getElementById('sScore').innerHTML=`<span style="color:${ok===rows.length?'var(--das)':'var(--die)'}">${ok} / ${rows.length} верно${ok===rows.length?(' — '+praise()):' — поправь и проверь'}</span>`;sChecked.add(sPage);renderDots();}

// ---- напиши с артиклем ----
function renderWrite(){document.getElementById('writeList').innerHTML=D.write.map((p,i)=>`<div class="wq" data-i="${i}"><span class="ru">${p[0]}</span><input placeholder="артикль + слово…" autocomplete="off"><span class="corr"></span></div>`).join('');document.getElementById('wScore').textContent='';}
function writeCheck(){let ok=0;document.querySelectorAll('#writeList .wq').forEach(r=>{const i=+r.dataset.i;const good=norm(r.querySelector('input').value)===norm(D.write[i][1]);r.classList.toggle('ok',good);r.classList.toggle('bad',!good);r.querySelector('.corr').textContent=good?'':'верно: '+D.write[i][1];if(good)ok++;});document.getElementById('wScore').innerHTML=`<span style="color:${ok===D.write.length?'var(--das)':'var(--die)'}">${ok} / ${D.write.length} верно${ok===D.write.length?(' — '+praise()):''}</span>`;}
function writeReset(){renderWrite();}
function writeShow(){if(!document.getElementById('wScore').textContent.trim()){alert('Сначала впиши ответы и нажми «Проверить».');return;}document.querySelectorAll('#writeList .wq').forEach(r=>{const i=+r.dataset.i;r.querySelector('input').value=D.write[i][1];r.classList.add('ok');r.classList.remove('bad');r.querySelector('.corr').textContent='';});document.getElementById('wScore').innerHTML='<span style="color:var(--accent)">Показаны ответы</span>';}

// ---- глаголы ----
function renderVerb(){document.getElementById('verbList').innerHTML=D.verbs.map((p,i)=>`<div class="wq" data-i="${i}"><span class="ru" style="color:var(--accent);font-weight:700">${p[0]}</span><input placeholder="перевод по-русски…" autocomplete="off"><span class="corr"></span></div>`).join('');document.getElementById('vScore').textContent='';}
function verbCheck(){let ok=0;document.querySelectorAll('#verbList .wq').forEach(r=>{const i=+r.dataset.i;const v=norm(r.querySelector('input').value);const good=v.length>=3 && norm(D.verbs[i][1]).includes(v);r.classList.toggle('ok',good);r.classList.toggle('bad',!good);r.querySelector('.corr').textContent=good?'':'верно: '+D.verbs[i][1];if(good)ok++;});document.getElementById('vScore').innerHTML=`<span style="color:${ok===D.verbs.length?'var(--das)':'var(--die)'}">${ok} / ${D.verbs.length} верно${ok===D.verbs.length?(' — '+praise()):''}</span>`;}
function verbShow(){if(!document.getElementById('vScore').textContent.trim()){alert('Сначала впиши ответы и нажми «Проверить».');return;}document.querySelectorAll('#verbList .wq').forEach(r=>{const i=+r.dataset.i;r.querySelector('input').value=D.verbs[i][1];r.classList.add('ok');r.querySelector('.corr').textContent='';});document.getElementById('vScore').innerHTML='<span style="color:var(--accent)">Показаны ответы</span>';}

renderMatch();renderSort();renderWrite();renderVerb();
</script>
