 1:{ title:'Текст 1 — В комнате мамы Лины', img:'img/dialog2-1.png',
   sub:'Тео и Лина заходят в красивую комнату мамы и рассматривают вещи: цвет, материал, цена, оценка. L4–L5.',
   prompt:`Тёплая детская книжная иллюстрация (не фотореализм), уютная красивая комната мамы. Тео и Лина зашли в комнату мамы Лины и с восхищением рассматривают вещи.

ТЕО — любопытный мальчик ~7 лет, рыжеватый вихор, большие глаза, восхищённо показывает пальцем на предметы; в руках детский планшет.
ЛИНА — тихая мечтательная девочка ~6 лет, показывает Тео мамину комнату; рядом её рисунок с кроликом.
МАМА Лины — тёплая улыбчивая женщина, появляется в дверях в конце.

Красивая комната мамы: деревянный коричневый большой стол, большое зеркало, белый шкаф, красное кресло, синий ковёр, жёлтая лампа из стекла, красные часы, большая жёлтая сумка, чёрные очки, маленькая цепочка-бусы, картинка на стене, белая кровать, деревянная полка, старая книжка.

Очень много цветов (красный, жёлтый, синий, зелёный, белый, коричневый, чёрный), уютно и нарядно. Тёплый дневной свет, восхищённый настрой «как красиво!». Без текста, букв и цифр в изображении.`,
   de:`<p><span class="sp das">Lina:</span> Theo, hier! Das ist Mamas Zimmer.</p>
   <p><span class="sp das theo">Theo:</span> Oh, wie schön! So viele Dinge!</p>
   <p><span class="sp das">Lina:</span> Ja! Der Tisch ist aus Holz, braun und groß. Schön, oder?</p>
   <p><span class="sp das theo">Theo:</span> Und der Spiegel! Der Spiegel ist groß. Aber teuer?</p>
   <p><span class="sp das">Lina:</span> Ja, sehr teuer — neunundneunzig Euro! Der Schrank ist weiß und neu.</p>
   <p><span class="sp das theo">Theo:</span> Der Sessel ist rot, der Teppich ist blau! Ist der Sessel aus Holz?</p>
   <p><span class="sp das">Lina:</span> Nein, der Sessel ist nicht aus Holz. Aber er ist praktisch.</p>
   <p><span class="sp das theo">Theo:</span> Und die Lampe? Die Lampe ist gelb und modern!</p>
   <p><span class="sp das">Lina:</span> Die Lampe ist aus Glas. Nur neun Euro — ein Sonderangebot!</p>
   <p><span class="sp das theo">Theo:</span> Günstig! Und die Uhr ist rot, die Tasche ist gelb, die Brille ist schwarz, die Kette ist klein…</p>
   <p><span class="sp das">Lina:</span> Mamas Tasche ist groß und schön. Und hier — ein Bild!</p>
   <p><span class="sp das theo">Theo:</span> Das Bild ist schön! Das Bett ist weiß, das Regal ist aus Holz, das Buch ist alt.</p>
   <p><span class="sp das">Lina:</span> Mamas Zimmer ist schön, oder? So viele Farben — rot, gelb, blau, grün, weiß, braun, schwarz!</p>
   <p><span class="sp das theo">Theo:</span> Ja, sehr schön! Aber wo ist Mama?</p>
   <p><span class="sp das">Lina:</span> <span class="rem">(lacht)</span> Hier ist Mama — sie kommt!</p>
   <p><span class="sp die">Mama:</span> Mein Zimmer ist schön, oder, Kinder?</p>
   <p><span class="sp das theo">Theo:</span> Sehr schön! Alles ist aus Holz, Glas und Metall!</p>`,
   ru:`<p><span class="sp das">Lina:</span> Тео, сюда! Это комната мамы.</p>
   <p><span class="sp das theo">Тео:</span> О, как красиво! Сколько всего!</p>
   <p><span class="sp das">Lina:</span> Да! Стол из дерева, коричневый и большой. Красиво, правда?</p>
   <p><span class="sp das theo">Тео:</span> А зеркало! Зеркало большое. Но дорогое?</p>
   <p><span class="sp das">Lina:</span> Да, очень дорогое — девяносто девять евро! Шкаф белый и новый.</p>
   <p><span class="sp das theo">Тео:</span> Кресло красное, ковёр синий! Кресло из дерева?</p>
   <p><span class="sp das">Lina:</span> Нет, кресло не из дерева. Но удобное.</p>
   <p><span class="sp das theo">Тео:</span> А лампа? Лампа жёлтая и современная!</p>
   <p><span class="sp das">Lina:</span> Лампа из стекла. Всего девять евро — по скидке!</p>
   <p><span class="sp das theo">Тео:</span> Выгодно! А часы красные, сумка жёлтая, очки чёрные, цепочка маленькая…</p>
   <p><span class="sp das">Lina:</span> Мамина сумка большая и красивая. А вот — картинка!</p>
   <p><span class="sp das theo">Тео:</span> Картинка красивая! Кровать белая, полка из дерева, книжка старая.</p>
   <p><span class="sp das">Lina:</span> Мамина комната красивая, правда? Сколько цветов — красный, жёлтый, синий, зелёный, белый, коричневый, чёрный!</p>
   <p><span class="sp das theo">Тео:</span> Да, очень красиво! А где мама?</p>
   <p><span class="sp das">Lina:</span> <span class="rem">(смеётся)</span> Вот мама — идёт!</p>
   <p><span class="sp die">Мама:</span> Моя комната красивая, правда, дети?</p>
   <p><span class="sp das theo">Тео:</span> Очень красиво! Всё из дерева, стекла и металла!</p>`,
   qa:[
     {q:'Wessen Zimmer ist das?',ru:'Чья это комната?',a:'Das ist Mamas Zimmer.',k:'mamas'},
     {q:'Wie viel kostet der Spiegel?',ru:'Сколько стоит зеркало?',a:'Der Spiegel kostet neunundneunzig Euro.',k:'neunundneunzig'},

   match:[['der Tisch','стол'],['der Spiegel','зеркало'],['der Sessel','кресло'],['die Lampe','лампа'],['die Tasche','сумка'],['das Bett','кровать']],
   sort:[['Tisch','der'],['Spiegel','der'],['Sessel','der'],['Schrank','der'],['Lampe','die'],['Tasche','die'],['Uhr','die'],['Bett','das'],['Regal','das'],['Bild','das']],
   write:[['стол','der Tisch'],['зеркало','der Spiegel'],['кресло','der Sessel'],['лампа','die Lampe'],['сумка','die Tasche'],['кровать','das Bett']],
   verbs:[['sein','быть'],['haben','иметь'],['kosten','стоить'],['finden','находить / считать'],['sehen','видеть'],['kommen','приходить']]
 },
 2:{ title:'Текст 2 — Грета в гостях у Carla', img:'img/dialog2-2.png',
   sub:'Грета у соседки Carla: вещи Carla — цена, материал, цвета, оценка. L4–L5.',
   prompt:`Тёплая книжная иллюстрация (не фотореализм), уютная квартира. Грета пришла в гости к соседке Carla; они вместе рассматривают вещи Carla.

ГРЕТА — тёплая округлая итальянка ~48 лет, круглые очки, тёмные кудри, яркая одежда, восхищённо всплёскивает руками.
CARLA — соседка Греты (немка), приветливая, спокойная, с гордостью показывает свои вещи. Отличается от Греты по виду (другая причёска/одежда), чтобы их было легко различить.

На виду вещи Carla: красная большая сумка, жёлтая лампа из стекла, красные часы, чёрные очки, маленькая цепочка-бусы, новая камера, синяя бутылка, зелёная щётка, белое мыло, большое зеркало, коричневое деревянное кресло.

Очень много ярких цветов (красный, жёлтый, зелёный, синий, белый, чёрный, оранжевый), ничего серого. Тёплый домашний свет, радостный женский настрой. Без текста, букв и цифр в изображении.`,
   de:`<p><span class="sp die">Greta:</span> Carla! Was hast du da? So schön!</p>
   <p><span class="sp die carla">Carla:</span> Hallo, Greta! Hier — meine Tasche! Sie ist rot und groß.</p>
   <p><span class="sp die">Greta:</span> Wie viel kostet die Tasche?</p>
   <p><span class="sp die carla">Carla:</span> Nur neunzehn Euro — ein Sonderangebot!</p>
   <p><span class="sp die">Greta:</span> Günstig! Und die Lampe ist gelb und modern. Aus Glas?</p>
   <p><span class="sp die carla">Carla:</span> Ja, die Lampe ist aus Glas. Sie ist neu. Schön, oder?</p>
   <p><span class="sp die">Greta:</span> Sehr schön! Und die Uhr ist rot, die Brille ist schwarz, die Kette ist klein. Und die Kamera!</p>
   <p><span class="sp die carla">Carla:</span> Meine Kamera ist neu, aber teuer. Und hier — die Flasche ist blau, die Bürste ist grün, die Seife ist weiß.</p>
   <p><span class="sp die">Greta:</span> Mamma mia, so viele Dinge! Und das ist dein Spiegel?</p>
   <p><span class="sp die carla">Carla:</span> Ja, der Spiegel ist groß, aber sehr teuer — neunundneunzig Euro!</p>
   <p><span class="sp die">Greta:</span> Teuer! Und der Sessel? Aus Holz?</p>
   <p><span class="sp die carla">Carla:</span> Ja, der Sessel ist aus Holz, braun und alt. Aber praktisch.</p>
   <p><span class="sp die">Greta:</span> Und die Farben! Rot, gelb, grün, blau, weiß, schwarz, orange! Bei dir ist nichts grau!</p>
   <p><span class="sp die carla">Carla:</span> <span class="rem">(lacht)</span> Nein, kein Grau! Ich finde Farben schön.</p>
   <p><span class="sp die">Greta:</span> Ich auch! Deine Möbel sind modern und deine Dinge sind günstig. Bravo, Carla!</p>
   <p><span class="sp die carla">Carla:</span> Danke, Greta! Alles ist schön bei mir!</p>`,
   ru:`<p><span class="sp die">Грета:</span> Carla! Что это у тебя? Как красиво!</p>
   <p><span class="sp die carla">Carla:</span> Привет, Грета! Вот — моя сумка! Она красная и большая.</p>
   <p><span class="sp die">Грета:</span> Сколько стоит сумка?</p>
   <p><span class="sp die carla">Carla:</span> Всего девятнадцать евро — по скидке!</p>
   <p><span class="sp die">Грета:</span> Выгодно! А лампа жёлтая и современная. Из стекла?</p>
   <p><span class="sp die carla">Carla:</span> Да, лампа из стекла. Она новая. Красиво, правда?</p>
   <p><span class="sp die">Грета:</span> Очень красиво! А часы красные, очки чёрные, цепочка маленькая. И камера!</p>
   <p><span class="sp die carla">Carla:</span> Моя камера новая, но дорогая. А вот — бутылка синяя, щётка зелёная, мыло белое.</p>
   <p><span class="sp die">Грета:</span> Mamma mia, сколько всего! А это твоё зеркало?</p>
   <p><span class="sp die carla">Carla:</span> Да, зеркало большое, но очень дорогое — девяносто девять евро!</p>
   <p><span class="sp die">Грета:</span> Дорого! А кресло? Из дерева?</p>
   <p><span class="sp die carla">Carla:</span> Да, кресло из дерева, коричневое и старое. Но удобное.</p>
   <p><span class="sp die">Грета:</span> А цвета! Красный, жёлтый, зелёный, синий, белый, чёрный, оранжевый! У тебя ничего серого!</p>
   <p><span class="sp die carla">Carla:</span> <span class="rem">(смеётся)</span> Нет, никакого серого! Я люблю цвета.</p>
   <p><span class="sp die">Грета:</span> Я тоже! Мебель у тебя современная, а вещи недорогие. Браво, Carla!</p>
   <p><span class="sp die carla">Carla:</span> Спасибо, Грета! У меня всё красиво!</p>`,

    const role= sp.classList.contains('carla')?'carla'
              : sp.classList.contains('der')?'male'
              : sp.classList.contains('die')?'female':'child';
    const c=p.cloneNode(true); c.querySelectorAll('.sp,.rem').forEach(e=>e.remove());
    return {t:c.textContent.replace(/\s+/g,' ').trim(), role};
  }).filter(x=>x.t);
  const urls=items.map((_,i)=>`audio/dlg2-${N}-${i}.mp3`);
  playSeq(urls, btn, items);
}

function renderMatch(){selDe=null;links={};colorOf={};nextC=0;const M=D.match;const order=shuffle(M.map((p,i)=>i));

const _der=[['Stuhl','der'],['Sessel','der'],['Tisch','der'],['Schrank','der'],['Teppich','der'],['Spiegel','der'],['Schlüssel','der'],['Geldbeutel','der'],['Regenschirm','der'],['Kugelschreiber','der'],['Bleistift','der'],['Preis','der']];
const _die=[['Tasche','die'],['Brille','die'],['Uhr','die'],['Lampe','die'],['Kette','die'],['Flasche','die'],['Kamera','die'],['Bürste','die'],['Seife','die'],['Farbe','die'],['Sonne','die'],['Möbel','die']];
const _das=[['Bett','das'],['Sofa','das'],['Regal','das'],['Bild','das'],['Zimmer','das'],['Buch','das'],['Handy','das'],['Auto','das'],['Telefon','das'],['Material','das'],['Geschäft','das'],['Sonderangebot','das'],['Holz','das'],['Glas','das'],['Metall','das'],['Plastik','das'],['Papier','das']];
function interleave(arrs){const out=[];let i=0,any=true;while(any){any=false;for(const a of arrs){if(i<a.length){out.push(a[i]);any=true;}}i++;}return out;}
const SORTPOOL=interleave([_der,_die,_das]);
const SPP=14, SPAGES=Math.ceil(SORTPOOL.length/SPP);
let sPage=(N-1)%SPAGES; const sChecked=new Set();
function renderDots(){document.getElementById('sortDots').innerHTML=Array.from({length:SPAGES},(_,i)=>`<span class="pdot${i===sPage?' cur':(sChecked.has(i)?' seen':'')}"></span>`).join('');}
function renderSort(){const items=SORTPOOL.slice(sPage*SPP,sPage*SPP+SPP);
  document.getElementById('sortList').innerHTML=items.map((p,i)=>`<div class="srow" data-i="${i}" data-g="${p[1]}"><span class="sw">${p[0]}</span><span class="sbtns"><button class="der" onclick="pickG(this,'der')">der</button><button class="die" onclick="pickG(this,'die')">die</button><button class="das" onclick="pickG(this,'das')">das</button></span><span class="mark"></span></div>`).join('');
  renderDots();document.getElementById('sScore').textContent='';}
function sortNext(){sPage=(sPage+1)%SPAGES;renderSort();}
function pickG(btn,g){const row=btn.closest('.srow');row.dataset.pick=g;row.classList.remove('ok','bad');row.querySelector('.mark').textContent='';row.querySelectorAll('.sbtns button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function sortCheck(){const rows=[...document.querySelectorAll('#sortList .srow')];let ok=0;rows.forEach(r=>{if(!r.dataset.pick)return;const good=r.dataset.pick===r.dataset.g;r.classList.toggle('ok',good);r.classList.toggle('bad',!good);r.querySelector('.mark').textContent=good?'✓':('✗ '+r.dataset.g);if(good)ok++;});document.getElementById('sScore').innerHTML=`<span style="color:${ok===rows.length?'var(--das)':'var(--die)'}">${ok} / ${rows.length} верно${ok===rows.length?(' — '+praise()):' — поправь и проверь'}</span>`;sChecked.add(sPage);renderDots();}

// ---- напиши с артиклем ----
function renderWrite(){document.getElementById('writeList').innerHTML=D.write.map((p,i)=>`<div class="wq" data-i="${i}"><span class="ru">${p[0]}</span><input placeholder="артикль + слово…" autocomplete="off"><span class="corr"></span></div>`).join('');document.getElementById('wScore').textContent='';}
function writeCheck(){let ok=0;document.querySelectorAll('#writeList .wq').forEach(r=>{const i=+r.dataset.i;const good=norm(r.querySelector('input').value)===norm(D.write[i][1]);r.classList.toggle('ok',good);r.classList.toggle('bad',!good);r.querySelector('.corr').textContent=good?'':'верно: '+D.write[i][1];if(good)ok++;});document.getElementById('wScore').innerHTML=`<span style="color:${ok===D.write.length?'var(--das)':'var(--die)'}">${ok} / ${D.write.length} верно${ok===D.write.length?(' — '+praise()):''}</span>`;}
function writeReset(){renderWrite();}
function writeShow(){if(!document.getElementById('wScore').textContent.trim()){alert('Сначала впиши ответы и нажми «Проверить».');return;}document.querySelectorAll('#writeList .wq').forEach(r=>{const i=+r.dataset.i;r.querySelector('input').value=D.write[i][1];r.classList.add('ok');r.classList.remove('bad');r.querySelector('.corr').textContent='';});document.getElementById('wScore').innerHTML='<span style="color:var(--accent)">Показаны ответы</span>';}

// ---- глаголы ----
function renderVerb(){document.getElementById('verbList').innerHTML=D.verbs.map((p,i)=>`<div class="wq" data-i="${i}"><span class="ru" style="color:var(--accent);font-weight:700">${p[0]}</span><input placeholder="перевод по-русски…" autocomplete="off"><span class="corr"></span></div>`).join('');document.getElementById('vScore').textContent='';}
function verbCheck(){let ok=0;document.querySelectorAll('#verbList .wq').forEach(r=>{const i=+r.dataset.i;const v=norm(r.querySelector('input').value);const good=v.length>=3 && norm(D.verbs[i][1]).includes(v);r.classList.toggle('ok',good);r.classList.toggle('bad',!good);r.querySelector('.corr').textContent=good?'':'верно: '+D.verbs[i][1];if(good)ok++;});document.getElementById('vScore').innerHTML=`<span style="color:${ok===D.verbs.length?'var(--das)':'var(--die)'}">${ok} / ${D.verbs.length} верно${ok===D.verbs.length?(' — '+praise()):''}</span>`;}
function verbShow(){if(!document.getElementById('vScore').textContent.trim()){alert('Сначала впиши ответы и нажми «Проверить».');return;}document.querySelectorAll('#verbList .wq').forEach(r=>{const i=+r.dataset.i;r.querySelector('input').value=D.verbs[i][1];r.classList.add('ok');r.querySelector('.corr').textContent='';});document.getElementById('vScore').innerHTML='<span style="color:var(--accent)">Показаны ответы</span>';}

renderMatch();renderSort();renderWrite();renderVerb();
</script>
<script src="js/chrome.js?v=3"></script>
</body>
