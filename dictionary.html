<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>Словарь</title>
<link rel="stylesheet" href="css/style.css?v=3">
<style>
  /* словарь (база — css/style.css; данные и рендер — js/woerter.js) */
  .tools{position:sticky;top:54px;background:var(--bg);padding:10px 0;z-index:4;border-bottom:1px solid var(--line)}
  .search{width:100%;font:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;background:#fff;outline:none}
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px #6d28d922}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
  .filters.tfilters{margin-top:6px}
  .chip{font-size:13px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:999px;padding:5px 12px;cursor:pointer;user-select:none}
  .chip[aria-pressed="true"]{border-color:transparent;color:#fff}
  .chip.f-der[aria-pressed="true"]{background:var(--der)}
  .chip.f-die[aria-pressed="true"]{background:var(--die)}
  .chip.f-das[aria-pressed="true"]{background:var(--das)}
  .chip.f-verb[aria-pressed="true"]{background:#eab308;color:#1f2937}
  .chip.f-other[aria-pressed="true"],.chip.f-theme[aria-pressed="true"]{background:var(--accent)}
  .chip.f-all[aria-pressed="true"]{background:#374151}
  .spacer{flex:1}
  .eye{font-size:13px;font-weight:600;color:var(--accent);background:#F3E8FF;border:none;
    border-radius:999px;padding:6px 12px;cursor:pointer}
  .btn-pdf{font-size:13px;font-weight:700;color:#fff;background:var(--accent);border:none;
    border-radius:999px;padding:6px 13px;cursor:pointer;margin-right:6px}
  .btn-pdf:active{background:var(--accent-hover)}

  .sec{margin:22px 0 10px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--accent);font-weight:700;display:flex;align-items:center;gap:8px}
  .sec .cnt{color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}
  .gwrap{margin:14px 0}
  .gtitle{display:inline-flex;align-items:center;gap:8px;font-weight:700;margin:0 0 8px}
  .gtitle .who{font-size:13px;color:var(--muted);font-weight:600}
  .list{display:grid;gap:7px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}

  .entry{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 11px;
    display:flex;align-items:center;gap:10px}
  .entry .art{font-weight:700;font-size:13px;min-width:30px;text-align:center;border-radius:6px;padding:2px 0}
  .entry.der .art{color:var(--der);background:#eff3ff}
  .entry.die .art{color:var(--die);background:#fdecec}
  .entry.das .art{color:var(--das);background:#e8f6ee}
  .entry .de{font-weight:600;font-size:15px}
  .entry .ru{color:var(--muted);font-size:14px;margin-left:auto;text-align:right}
  body.hide-ru .entry .ru{visibility:hidden}
  body.hide-ru .entry .ru::after{content:"· · ·";visibility:visible;color:#cbd5e1}
  .entry .say,.pair .say{border:none;background:none;cursor:pointer;font-size:16px;opacity:.6;padding:2px;flex:none}
  .entry .say:hover,.pair .say:hover{opacity:1}

  .ventry{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .vhead{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer}
  .vhead .de{font-weight:600;font-size:15px}
  .vhead .ru{color:var(--muted);font-size:14px;margin-left:auto}
  .pastline{margin:8px 0 2px}
  .past{display:inline-block;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;border-radius:8px;font-size:13px;font-weight:700;padding:4px 10px;cursor:pointer}
  .past:active{background:#ffedd5}
  body.hide-ru .vhead .ru,body.hide-ru .pair .ru{visibility:hidden}
  body.hide-ru .vhead .ru::after{content:"· · ·";visibility:visible;color:#cbd5e1}
  .vhead .caret{color:#9ca3af;font-size:12px;flex:none;transition:transform .15s}
  .ventry.open .vhead .caret{transform:rotate(90deg)}
  .conj{display:none;border-top:1px solid var(--line);padding:8px 11px 11px;background:#fbfbfe}
  .ventry.open .conj{display:block}
  .conj .grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px}
  .conj .row{display:flex;gap:7px;font-size:14px;padding:3px 4px;border-radius:6px;cursor:pointer}
  .conj .row:hover{background:#f1edfb}
  .conj .row .pro{color:var(--muted);min-width:64px}
  .conj .row .frm{font-weight:600}
  .conj .tip{font-size:12px;color:var(--muted);margin-top:7px}

  .pairs{display:grid;gap:7px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .pair{background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 11px;display:flex;gap:10px;align-items:center}
  .pair .de{font-weight:600;font-size:14px}
  .pair .ru{color:var(--muted);font-size:13px;margin-left:auto;text-align:right}
  .d-empty{color:var(--muted);font-size:14px;padding:18px;text-align:center}
</style>
</head>
<body>
<header class="top"><div class="wrap"><a class="home" href="index.html">🇩🇪 Deutsch A1</a><span class="crumb" id="crumb">/ Словарь</span></div></header>

<main class="wrap">
  <h1 id="title">Словарь</h1>
  <p class="lead" id="lead"></p>

  <div id="dict"></div>

</main>
<footer id="foot">Deutsch A1 · словарь</footer>

<script src="js/app.js?v=3"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="js/woerter.js?v=3"></script>
<script>
  const params = new URLSearchParams(location.search);
  const thema = params.get('thema');               // напр. "01" → словарь только темы; пусто → общий
  const t = thema ? WOERTER.themes.find(x=>x.id===thema) : null;

  if(thema && t){
    document.getElementById('crumb').textContent = `/ Тема ${t.id} / Словарь`;
    document.title = `Словарь — Тема ${t.id}`;
    document.getElementById('title').innerHTML = `Словарь темы ${t.id} <span class="badge">${t.lessons}</span>`;
    document.getElementById('lead').innerHTML = `<b>${t.title}</b>. Все слова темы с переводом. Клик 🔊 — озвучка; у глагола — спряжение; «глазик» прячет переводы для самопроверки.`;
    document.getElementById('foot').textContent = `Deutsch A1 · словарь темы ${t.id}`;
  } else {
    const n = WOERTER.themes.length;
    document.getElementById('title').innerHTML = `Словарь <span class="badge">общий · накопительный</span>`;
    document.getElementById('lead').innerHTML = `Все слова пройденных тем в одном месте (тем: ${n}). По мере добавления тем словарь растёт сам. Поиск, фильтр по роду, глазик, озвучка.`;
  }

  Dict.init({ mount: document.getElementById('dict'), thema: (thema && t) ? thema : null });

  // авто-выбор рода (?g=der|die|das) и авто-скачивание PDF (?pdf=1) — для кнопок «Словарь PDF» на темах/сценах
  (function(){
    const g=params.get('g'), wantPdf=params.get('pdf')==='1';
    if(g){ const chip=document.querySelector(`.chip[data-f="${g}"]`); if(chip) chip.click(); }
    if(wantPdf){
      let tries=0;
      const timer=setInterval(()=>{
        tries++;
        if(window.html2pdf){ clearInterval(timer); const b=document.querySelector('.btn-pdf'); if(b) b.click(); }
        else if(tries>40){ clearInterval(timer); }
      },150);
    }
  })();
</script>
<script src="js/chrome.js?v=3"></script>
</body>
</html>
